# Docker Compose for Private Website (heinesch.com) — local prod profile
name: private-website

services:
  private-website-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: private-website-web
    profiles:
      - prod
    restart: unless-stopped
    ports:
      - "4500:80"
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "80"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://127.0.0.1:80 >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - npm_shared

networks:
  npm_shared:
    external: true
