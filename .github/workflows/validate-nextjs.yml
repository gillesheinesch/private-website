name: Validate Private Website (Next.js)

# Run only when PR is ready for review (not draft)
on:
    pull_request:
        types: [opened, reopened, synchronize]
        branches: [master, dev]

    # Allow manual validation
    workflow_dispatch:

jobs:
    validate:
        # Skip when PR is still in draft
        if: github.event_name != 'pull_request' || !github.event.pull_request.draft
        name: Validate Private Website
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20.x"
                  cache: "npm"

            # Install dependencies
            - name: Install dependencies
              run: npm ci

            - name: Security audit
              run: npm audit --audit-level=moderate

            - name: Lint
              run: npm run lint

            - name: TypeScript check
              run: npx tsc --noEmit

            - name: Unit & integration tests
              run: npm test

            - name: Build
              run: npm run build

    validation-summary:
        name: Summary
        runs-on: ubuntu-latest
        needs: validate
        if: always()

        steps:
            - name: Report
              run: |
                  if [ "${{ needs.validate.result }}" = "skipped" ]; then
                    echo "Skipped (draft PR – mark Ready for review to run)"
                  elif [ "${{ needs.validate.result }}" != "success" ]; then
                    echo "Validation failed"
                    exit 1
                  fi
